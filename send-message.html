<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bot - Send Message</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            max-width: 480px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px -10px rgba(16, 185, 129, 0.4);
        }
        
        .logo svg {
            width: 40px;
            height: 40px;
            color: white;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }
        
        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            font-weight: 400;
        }
        
        .form-card {
            background: rgba(15, 23, 42, 0.7);
            border-radius: 16px;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        .step-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        
        .step {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .step-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .step-number.active {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        
        .step-number.completed {
            background: #10b981;
            color: white;
        }
        
        .step-number.inactive {
            background: rgba(255, 255, 255, 0.1);
            color: #64748b;
        }
        
        .step-label {
            font-size: 13px;
            color: #64748b;
            font-weight: 500;
        }
        
        .step-label.active {
            color: #f1f5f9;
        }
        
        .step-line {
            width: 40px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .step-line.completed {
            background: #10b981;
        }
        
        .form-section {
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        .form-section.active {
            display: block;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 8px;
        }
        
        .input-field {
            width: 100%;
            padding: 14px 18px;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #f1f5f9;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            border-color: rgba(16, 185, 129, 0.5);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        .input-field::placeholder {
            color: #64748b;
        }
        
        textarea.input-field {
            resize: vertical;
            min-height: 120px;
            line-height: 1.6;
        }
        
        .file-upload {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .file-upload:hover {
            border-color: rgba(16, 185, 129, 0.5);
            background: rgba(16, 185, 129, 0.05);
        }
        
        .file-upload-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 12px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .file-upload-icon svg {
            width: 24px;
            height: 24px;
            color: #10b981;
        }
        
        .file-upload-text {
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 4px;
        }
        
        .file-upload-hint {
            font-size: 12px;
            color: #64748b;
        }
        
        .file-selected {
            margin-top: 12px;
            padding: 12px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 10px;
            display: none;
            align-items: center;
            gap: 10px;
        }
        
        .file-selected.show {
            display: flex;
        }
        
        .file-icon {
            width: 36px;
            height: 36px;
            background: rgba(16, 185, 129, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #10b981;
        }
        
        .file-info {
            flex: 1;
        }
        
        .file-name {
            font-size: 13px;
            color: #f1f5f9;
            font-weight: 500;
        }
        
        .file-size {
            font-size: 12px;
            color: #64748b;
        }
        
        .remove-file {
            background: rgba(239, 68, 68, 0.2);
            border: none;
            border-radius: 6px;
            padding: 6px 10px;
            color: #f87171;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .remove-file:hover {
            background: rgba(239, 68, 68, 0.3);
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .btn-secondary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            color: #fca5a5;
            font-size: 13px;
            text-align: center;
        }
        
        .error-message.active {
            display: block;
        }
        
        .success-message {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .success-message.active {
            display: block;
        }
        
        .success-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.5s ease-out;
        }
        
        .success-icon svg {
            width: 36px;
            height: 36px;
            color: white;
        }
        
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .success-title {
            font-size: 20px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 8px;
        }
        
        .success-text {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 24px;
        }
        
        .footer {
            margin-top: 28px;
            text-align: center;
            font-size: 12px;
            color: #475569;
        }
        
        .footer a {
            color: #10b981;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        #attachment-input {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                </svg>
            </div>
            <h1>WhatsApp Bot</h1>
            <p class="subtitle">Send Messages with Ease</p>
        </div>
        
        <div class="form-card">
            <div class="step-indicator">
                <div class="step">
                    <div class="step-number active" id="step-1-indicator">1</div>
                    <span class="step-label active" id="step-1-label">Token</span>
                </div>
                <div class="step-line" id="step-line-1"></div>
                <div class="step">
                    <div class="step-number inactive" id="step-2-indicator">2</div>
                    <span class="step-label" id="step-2-label">Message</span>
                </div>
            </div>
            
            <div class="error-message" id="error-message">
                <span id="error-text"></span>
            </div>
            
            <div class="form-section active" id="step-1">
                <div class="input-group">
                    <label class="input-label">API Token</label>
                    <input 
                        type="text" 
                        id="token-input" 
                        class="input-field" 
                        placeholder="Enter your API token"
                    >
                </div>
                
                <div class="button-group">
                    <button class="btn btn-primary" id="next-btn" onclick="goToStep2()">Continue</button>
                </div>
            </div>
            
            <div class="form-section" id="step-2">
                <div class="input-group">
                    <label class="input-label">Mobile Number</label>
                    <input 
                        type="text" 
                        id="phone-input" 
                        class="input-field" 
                        placeholder="Enter mobile number (e.g., 919999999999)"
                    >
                </div>
                
                <div class="input-group">
                    <label class="input-label">Message <span style="color: #64748b; font-weight: 400;">(optional)</span></label>
                    <textarea 
                        id="message-input" 
                        class="input-field" 
                        placeholder="Type your message here..."
                    ></textarea>
                </div>
                
                <div class="input-group">
                    <label class="input-label">Attachment <span style="color: #64748b; font-weight: 400;">(optional)</span></label>
                    <div class="file-upload" onclick="document.getElementById('attachment-input').click()">
                        <div class="file-upload-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                        </div>
                        <div class="file-upload-text">Click to upload a file</div>
                        <div class="file-upload-hint">Images, videos, documents (max 50MB)</div>
                    </div>
                    <input type="file" id="attachment-input" onchange="handleFileSelect(event)">
                    <div class="file-selected" id="file-selected">
                        <div class="file-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                                <polyline points="13 2 13 9 20 9"></polyline>
                            </svg>
                        </div>
                        <div class="file-info">
                            <div class="file-name" id="file-name"></div>
                            <div class="file-size" id="file-size"></div>
                        </div>
                        <button class="remove-file" onclick="removeFile(event)">Remove</button>
                    </div>
                </div>
                
                <div class="button-group">
                    <button class="btn btn-secondary" onclick="goToStep1()">Back</button>
                    <button class="btn btn-primary" id="send-btn" onclick="sendMessage()">Send Message</button>
                </div>
            </div>
            
            <div class="success-message" id="success-message">
                <div class="success-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <h3 class="success-title">Message Sent!</h3>
                <p class="success-text">Your message has been queued for delivery</p>
                <div class="button-group">
                    <button class="btn btn-secondary" onclick="resetForm()">Send Another</button>
                </div>
            </div>
        </div>
        
        <div class="footer">
            Built with care • <a href="#" onclick="location.reload(); return false;">Refresh</a>
        </div>
    </div>
    
    <script>
        let currentToken = null;
        let selectedFile = null;
        
        async function goToStep2() {
            const token = document.getElementById('token-input').value.trim();
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            
            if (!token) {
                errorText.textContent = 'Please enter your API token';
                errorMessage.classList.add('active');
                return;
            }
            
            // Verify token by checking login status
            try {
                errorMessage.classList.remove('active');
                
                const response = await fetch('/api/login-status', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                
                if (data.success && data.loggedIn) {
                    currentToken = token;
                    
                    // Update step indicators
                    document.getElementById('step-1-indicator').classList.remove('active');
                    document.getElementById('step-1-indicator').classList.add('completed');
                    document.getElementById('step-1-label').classList.remove('active');
                    document.getElementById('step-line-1').classList.add('completed');
                    document.getElementById('step-2-indicator').classList.remove('inactive');
                    document.getElementById('step-2-indicator').classList.add('active');
                    document.getElementById('step-2-label').classList.add('active');
                    
                    // Switch to step 2
                    document.getElementById('step-1').classList.remove('active');
                    document.getElementById('step-2').classList.add('active');
                } else {
                    errorText.textContent = 'Invalid token or session not logged in';
                    errorMessage.classList.add('active');
                }
            } catch (error) {
                console.error('Error verifying token:', error);
                errorText.textContent = 'Error verifying token. Please try again.';
                errorMessage.classList.add('active');
            }
        }
        
        function goToStep1() {
            // Update step indicators
            document.getElementById('step-2-indicator').classList.remove('active');
            document.getElementById('step-2-indicator').classList.add('inactive');
            document.getElementById('step-2-label').classList.remove('active');
            document.getElementById('step-line-1').classList.remove('completed');
            document.getElementById('step-1-indicator').classList.remove('completed');
            document.getElementById('step-1-indicator').classList.add('active');
            document.getElementById('step-1-label').classList.add('active');
            
            // Switch to step 1
            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-1').classList.add('active');
            document.getElementById('error-message').classList.remove('active');
        }
        
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                
                // Show file details
                document.getElementById('file-name').textContent = file.name;
                document.getElementById('file-size').textContent = formatFileSize(file.size);
                document.getElementById('file-selected').classList.add('show');
            }
        }
        
        function removeFile(event) {
            event.preventDefault();
            event.stopPropagation();
            selectedFile = null;
            document.getElementById('attachment-input').value = '';
            document.getElementById('file-selected').classList.remove('show');
        }
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        async function sendMessage() {
            const phone = document.getElementById('phone-input').value.trim();
            const message = document.getElementById('message-input').value.trim();
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const sendBtn = document.getElementById('send-btn');
            
            if (!phone) {
                errorText.textContent = 'Please enter a mobile number';
                errorMessage.classList.add('active');
                return;
            }
            
            try {
                errorMessage.classList.remove('active');
                sendBtn.disabled = true;
                sendBtn.textContent = 'Sending...';
                
                const contact = {
                    phone: phone,
                    message: message || ''
                };
                
                if (selectedFile) {
                    const base64 = await fileToBase64(selectedFile);
                    contact.attachment = base64;
                }
                
                const response = await fetch('/api/send-messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({
                        contacts: [contact]
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Show success message
                    document.getElementById('step-2').classList.remove('active');
                    document.getElementById('success-message').classList.add('active');
                } else {
                    errorText.textContent = data.message || 'Failed to send message';
                    errorMessage.classList.add('active');
                }
            } catch (error) {
                console.error('Error sending message:', error);
                errorText.textContent = 'Error sending message. Please try again.';
                errorMessage.classList.add('active');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send Message';
            }
        }
        
        function resetForm() {
            // Reset form
            document.getElementById('phone-input').value = '';
            document.getElementById('message-input').value = '';
            document.getElementById('attachment-input').value = '';
            document.getElementById('file-selected').classList.remove('show');
            selectedFile = null;
            
            // Show step 2
            document.getElementById('success-message').classList.remove('active');
            document.getElementById('step-2').classList.add('active');
        }
    </script>
</body>
</html>
