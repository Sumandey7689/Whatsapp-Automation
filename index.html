<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Login QR</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
        }

        img {
            max-width: 300px;
            margin-top: 20px;
        }

        .status {
            margin-top: 15px;
            font-weight: bold;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>WhatsApp Login</h2>
    <p>Scan the QR code with WhatsApp.</p>

    <img id="qrImage" style="display:none;" alt="QR Code">

    <div id="status" class="status">Loading QR Code...</div>
</div>
<script>
async function loadQR() {
    try {
        const response = await fetch('http://localhost:3000/api/login-qr', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        });

        const data = await response.json();

        const statusEl = document.getElementById('status');
        const qrImage = document.getElementById('qrImage');

        if (data.loggedIn) {
            statusEl.textContent = 'Already Logged In ✅';
            qrImage.style.display = 'none';
            return;
        }

        if (data.qrCode) {
            qrImage.src = data.qrCode;
            qrImage.style.display = 'block';
            statusEl.textContent = 'Scan the QR Code';
        } else {
            statusEl.textContent = 'QR Code not available';
        }

    } catch (err) {
        console.error(err);
        document.getElementById('status').textContent =
            'Failed to load QR Code';
    }
}

loadQR();
setInterval(loadQR, 5000);
</script>
</body>
</html>
