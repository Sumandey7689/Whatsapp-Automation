services:
  whatsapp-bot:
    build: .
    container_name: whatsapp-bot
    ports:
      - "3000:3000"
    volumes:
      - ./tokens:/app/tokens
      - ./contact.json:/app/contact.json
      - ./attachments:/app/attachments
      - ./logs:/app/logs
    stdin_open: true
    tty: true
    shm_size: "2gb"
    restart: unless-stopped