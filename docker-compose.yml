services:
  redis:
    image: redis:7-alpine
    container_name: whatsapp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  whatsapp-bot:
    build: .
    container_name: whatsapp-bot
    ports:
      - "3000:3000"
    volumes:
      - ./tokens:/app/tokens
      - ./contact.json:/app/contact.json
      - ./attachments:/app/attachments
      - ./logs:/app/logs
    stdin_open: true
    tty: true
    shm_size: "2gb"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data:
